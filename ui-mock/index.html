<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mock UI</title>
  </head>
  <body>
    <h1>Mock UI Item List</h1>

    <h2>Add New Item</h2>
    <input id="newItem" placeholder="Item Name" />
    <button id="addBtn">Add</button>

    <h2>Item List</h2>
    <ul id="items"></ul>

    <script>
      const API_URL = "http://localhost:3000/items";

      async function loadItems() {
        const res = await fetch(API_URL);
        const data = await res.json();

        const list = document.getElementById("items");
        list.innerHTML = "";

        data.forEach((item) => {
          const li = document.createElement("li");

          // TOGGLE ITEM STATUS
          const toggleStatusCheck = document.createElement("input");
          toggleStatusCheck.type = "checkbox";
          toggleStatusCheck.checked = item.status === "active";

          toggleStatusCheck.addEventListener("change", async () => {
            const newStatus = toggleStatusCheck.checked ? "active" : "inactive";

            await fetch(`${API_URL}/${item.id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: item.name,
                status: newStatus,
              }),
            });

            loadItems();
          });

          // ITEM NAME
          const nameSpan = document.createElement("span");
          nameSpan.textContent = " " + item.name + " ";

          // EDIT BUTTON
          const editBtn = document.createElement("button");
          editBtn.textContent = "Edit";

          editBtn.addEventListener("click", () => {
            const input = document.createElement("input");
            input.value = item.name;

            const saveBtn = document.createElement("button");
            saveBtn.textContent = "Save";

            li.innerHTML = "";
            li.appendChild(input);
            li.appendChild(saveBtn);

            saveBtn.addEventListener("click", async () => {
              await fetch(`${API_URL}/${item.id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  name: input.value,
                  status: item.status,
                }),
              });

              loadItems();
            });
          });

          // DELETE BUTTON
          const deleteBtn = document.createElement("button");
          deleteBtn.textContent = "Delete";
          deleteBtn.style.marginLeft = "10px";
          deleteBtn.addEventListener("click", async () => {
            await fetch(`${API_URL}/${item.id}`, { method: "DELETE" });
            loadItems();
          });

          li.appendChild(toggleStatusCheck);
          li.appendChild(nameSpan);
          li.appendChild(deleteBtn);
          li.appendChild(editBtn);

          list.appendChild(li);
        });
      }

      // CREATE NEW ITEM METHOD
      document.getElementById("addBtn").addEventListener("click", async () => {
        const name = document.getElementById("newItem").value;

        if (!name.trim()) return;

        await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, status: "active" }),
        });

        document.getElementById("newItem").value = "";
        loadItems();
      });

      loadItems();
    </script>
  </body>
</html>
